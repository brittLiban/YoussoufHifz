services:

  # ─────────────────────────────────────────────
  # PostgreSQL 16 — primary database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: youssouf_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-youssouf}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-youssouf}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"        # expose locally for migrations / dev tools
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-youssouf}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis — job queue, rate limiting, session cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: youssouf_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MinIO — self-hosted S3-compatible audio storage
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: youssouf_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"       # S3 API (internal use only — nginx blocks public access)
      - "9001:9001"       # MinIO console (restrict to localhost/VPN in prod)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─────────────────────────────────────────────
  # API — Node.js/Fastify backend
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: youssouf_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-youssouf}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-youssouf}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_BUCKET: youssouf-audio
    ports:
      - "3000:3000"
    volumes:
      - /tmp/youssouf:/tmp/youssouf  # temp files for ffmpeg processing

  # ─────────────────────────────────────────────
  # Worker — background jobs (ffmpeg, cron reminders)
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: youssouf_worker
    restart: unless-stopped
    command: node dist/worker.js
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-youssouf}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-youssouf}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_BUCKET: youssouf-audio
    volumes:
      - /tmp/youssouf:/tmp/youssouf

  # ─────────────────────────────────────────────
  # Nginx — reverse proxy + SSL termination
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: youssouf_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro     # SSL certs (Let's Encrypt)
      - certbot_data:/var/www/certbot:ro  # ACME challenge
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_data:
